<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>教师教学APP</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif;}
        body {padding: 15px; background: #f5f5f5;}
        .container {max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px;}
        .video-box {margin: 20px 0;}
        video {width: 100%; border-radius: 8px;}
        .question {margin: 25px 0; padding: 15px; border: 1px solid #eee; border-radius: 8px;}
        .option {margin: 10px 0; padding: 8px;}
        .submit-btn {background: #42b983; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 10px 0;}
        .result {margin-top: 10px; color: #e63946; font-weight: bold;}
        textarea {width: 100%; height: 100px; padding: 10px; border-radius: 5px; border: 1px solid #ccc;}
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 教师教学视频平台</h1>

        <div class="video-box">
            <h3>视频1：课程入门讲解</h3>

            <video controls src="50米跑.mp4"></video>
        </div>
         <div class="video-box">
            <h3>视频1：课程入门讲解</h3>

            <video controls src="立定跳远.mp4"></video>
        </div>

        <!-- 2. 选择题区域 -->
        <div class="question">
            <h4>📝 选择题（单选）</h4>
            <p>1. 视频中讲解的核心知识点是？</p>
            <div class="option"><input type="radio" name="q1" value="A"> A. 基础概念</div>
            <div class="option"><input type="radio" name="q1" value="B"> B. 高级技巧</div>
            <div class="option"><input type="radio" name="q1" value="C"> C. 实操案例</div>
            <button class="submit-btn" onclick="checkAnswer()">提交答案</button>
            <div id="answerResult" class="result"></div>
        </div>

   
        <div class="question">
            <h4>✍️ 文字论述题</h4>
            <p>请结合视频内容，简述你的学习心得：</p>
            <textarea id="essay" placeholder="请输入你的答案..."></textarea>
            <button class="submit-btn" onclick="submitEssay()">提交论述</button>
            <div id="essayResult" class="result"></div>
        </div>
    </div>

    <script>
        // 选择题正确答案（自定义修改）
        const correctAnswer = "A";
        // 判分逻辑
        function checkAnswer() {
            let selected = document.querySelector('input[name="q1"]:checked');
            let result = document.getElementById("answerResult");
            if (!selected) {
                result.innerText = "请选择一个选项！";
                return;
            }
            if (selected.value === correctAnswer) {
                result.innerText = "✅ 回答正确！";
                result.style.color = "#42b983";
            } else {
                result.innerText = "❌ 回答错误，正确答案：A";
                result.style.color = "#e63946";
            }
        }
        // 论述题提交
        function submitEssay() {
            let content = document.getElementById("essay").value;
            let result = document.getElementById("essayResult");
            if (content.trim() === "") {
                result.innerText = "请输入论述内容！";
            } else {
                result.innerText = "✅ 论述提交成功！";
                result.style.color = "#42b983";
            }
        }
    </script>
</body>
</html>
